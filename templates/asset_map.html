<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Asset Relationship Map</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.css">
    <style>
        body {
            background: #0a0e1a;
            color: #eaeaea;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .navbar {
            background: #141b2b;
            border-bottom: 2px solid #00ff9d;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        #mynetwork {
            width: 100%;
            height: calc(100vh - 56px);
            margin-top: 56px;
            background: #0a0e1a;
        }

        .info-panel {
            position: fixed;
            top: 70px;
            right: 20px;
            width: 300px;
            background: #141b2b;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border-left: 4px solid #00ff9d;
            z-index: 1000;
            display: none;
            color: white;
        }

        .info-panel.show {
            display: block;
        }

        .legend {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #141b2b;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #00ff9d;
            z-index: 1000;
            color: white;
            max-height: 80vh;
            overflow-y: auto;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin: 5px 0;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            margin-right: 10px;
        }

        /* Original types */
        .asset-type { background: #3498db; }
        .subdomain-type { background: #2ecc71; }
        .url-type { background: #e74c3c; }
        .ip-type { background: #f39c12; }
        .port-type { background: #9b59b6; }
        /* New professional types */
        .service-type { background: #1abc9c; }
        .technology-type { background: #e67e22; }
        .email-type { background: #34495e; }
        .cloud_asset-type { background: #16a085; }
        .api_endpoint-type { background: #d35400; }

        .stats-bar {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #141b2b;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #00ff9d;
            z-index: 1000;
            color: white;
            max-width: 300px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('attack_surface_intelligence') }}">
                <i class="bi bi-diagram-3"></i> Asset Relationship Map
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{{ url_for('attack_surface_intelligence') }}">
                    <i class="bi bi-arrow-left"></i> Back to ASI
                </a>
            </div>
        </div>
    </nav>

    <div id="mynetwork"></div>

    <div class="legend">
        <h6><i class="bi bi-palette"></i> Legend</h6>
        <div class="legend-item">
            <div class="legend-color asset-type"></div>
            <span>Asset (Domain)</span>
        </div>
        <div class="legend-item">
            <div class="legend-color subdomain-type"></div>
            <span>Subdomain</span>
        </div>
        <div class="legend-item">
            <div class="legend-color url-type"></div>
            <span>URL</span>
        </div>
        <div class="legend-item">
            <div class="legend-color ip-type"></div>
            <span>IP Address</span>
        </div>
        <div class="legend-item">
            <div class="legend-color port-type"></div>
            <span>Port</span>
        </div>
        <!-- New types -->
        <div class="legend-item">
            <div class="legend-color service-type"></div>
            <span>Service</span>
        </div>
        <div class="legend-item">
            <div class="legend-color technology-type"></div>
            <span>Technology</span>
        </div>
        <div class="legend-item">
            <div class="legend-color email-type"></div>
            <span>Email</span>
        </div>
        <div class="legend-item">
            <div class="legend-color cloud_asset-type"></div>
            <span>Cloud Asset</span>
        </div>
        <div class="legend-item">
            <div class="legend-color api_endpoint-type"></div>
            <span>API Endpoint</span>
        </div>
    </div>

    <div class="stats-bar" id="stats">
        <h6><i class="bi bi-bar-chart"></i> Statistics</h6>
        <div>Total Nodes: <span id="nodeCount">0</span></div>
        <div>Total Connections: <span id="edgeCount">0</span></div>
    </div>

    <div class="info-panel" id="infoPanel">
        <h5 id="infoTitle">Node Information</h5>
        <div id="infoContent"></div>
    </div>

    <script>
        var nodes = new vis.DataSet({{ nodes | safe }});
        var edges = new vis.DataSet({{ links | safe }});

        var container = document.getElementById('mynetwork');

        var data = {
            nodes: nodes,
            edges: edges
        };

        var options = {
            layout: {
                improvedLayout: true,
                hierarchical: {
                    enabled: false
                }
            },
            nodes: {
                shape: 'dot',
                size: 20,
                font: {
                    color: '#eaeaea',
                    size: 12,
                    face: 'Segoe UI'
                },
                borderWidth: 2,
                shadow: true
            },
            edges: {
                width: 2,
                color: { color: '#00ff9d', highlight: '#2ecc71' },
                smooth: {
                    type: 'continuous'
                },
                arrows: {
                    to: { enabled: true, scaleFactor: 0.5 }
                },
                font: {
                    color: '#eaeaea',
                    size: 10
                }
            },
            physics: {
                enabled: true,
                stabilization: {
                    iterations: 1000
                },
                solver: 'forceAtlas2Based',
                forceAtlas2Based: {
                    gravitationalConstant: -50,
                    centralGravity: 0.01,
                    springLength: 100,
                    springConstant: 0.08
                }
            },
            interaction: {
                hover: true,
                tooltipDelay: 200,
                navigationButtons: true,
                keyboard: true
            },
            groups: {
                asset: {
                    color: { background: '#3498db', border: '#2980b9' },
                    shape: 'dot',
                    size: 30
                },
                subdomain: {
                    color: { background: '#2ecc71', border: '#27ae60' },
                    shape: 'dot',
                    size: 20
                },
                url: {
                    color: { background: '#e74c3c', border: '#c0392b' },
                    shape: 'dot',
                    size: 15
                },
                ip: {
                    color: { background: '#f39c12', border: '#e67e22' },
                    shape: 'dot',
                    size: 15
                },
                port: {
                    color: { background: '#9b59b6', border: '#8e44ad' },
                    shape: 'dot',
                    size: 10
                },
                // New groups
                service: {
                    color: { background: '#1abc9c', border: '#16a085' },
                    shape: 'dot',
                    size: 15
                },
                technology: {
                    color: { background: '#e67e22', border: '#d35400' },
                    shape: 'dot',
                    size: 15
                },
                email: {
                    color: { background: '#34495e', border: '#2c3e50' },
                    shape: 'dot',
                    size: 12
                },
                cloud_asset: {
                    color: { background: '#16a085', border: '#0e6b5c' },
                    shape: 'dot',
                    size: 15
                },
                api_endpoint: {
                    color: { background: '#d35400', border: '#a04000' },
                    shape: 'dot',
                    size: 12
                }
            }
        };

        var network = new vis.Network(container, data, options);

        // Update stats
        network.once('stabilizationIterationsDone', function() {
            document.getElementById('nodeCount').innerText = nodes.length;
            document.getElementById('edgeCount').innerText = edges.length;
            network.setOptions({ physics: false });
        });

        // Handle node click
        network.on('click', function(params) {
            if (params.nodes.length > 0) {
                var nodeId = params.nodes[0];
                var node = nodes.get(nodeId);

                document.getElementById('infoTitle').innerHTML = node.label || 'Node Information';

                var content = '<table class="table table-sm text-light">';
                content += '<tr><td><strong>Type:</strong></td><td>' + (node.group || 'Unknown') + '</td></tr>';

                if (node.status) {
                    content += '<tr><td><strong>Status:</strong></td><td><span class="badge bg-' + (node.status == 'approved' ? 'success' : 'warning') + '">' + node.status + '</span></td></tr>';
                }

                if (node.title) {
                    var titleParts = node.title.split('\n');
                    titleParts.forEach(part => {
                        var parts = part.split(': ');
                        if (parts.length > 1) {
                            content += '<tr><td><strong>' + parts[0] + ':</strong></td><td>' + parts[1] + '</td></tr>';
                        }
                    });
                }

                if (node.value) {
                    var riskClass = 'secondary';
                    if (node.value >= 20) riskClass = 'danger';
                    else if (node.value >= 10) riskClass = 'warning';
                    else if (node.value >= 5) riskClass = 'info';
                    else if (node.value > 0) riskClass = 'success';

                    content += '<tr><td><strong>Risk Score:</strong></td><td><span class="badge bg-' + riskClass + '">' + node.value + '</span></td></tr>';
                }

                content += '</table>';

                document.getElementById('infoContent').innerHTML = content;
                document.getElementById('infoPanel').classList.add('show');
            }
        });

        // Handle double click to zoom to node
        network.on('doubleClick', function(params) {
            if (params.nodes.length > 0) {
                network.focus(params.nodes[0], {
                    scale: 1.5,
                    animation: true
                });
            }
        });

        // Hide info panel when clicking on empty space
        network.on('click', function(params) {
            if (params.nodes.length === 0 && params.edges.length === 0) {
                document.getElementById('infoPanel').classList.remove('show');
            }
        });

        // Handle window resize
        window.addEventListener('resize', function() {
            network.fit();
        });
    </script>
      <script src="/static/js/i18n.js"></script>
    <script>
        // Initialize language switcher
        const langSelect = document.getElementById('languageSwitcher');
        if (langSelect) {
            const savedLang = localStorage.getItem('asi_lang') || 'en';
            langSelect.value = savedLang;
            if (typeof applyLanguage === 'function') applyLanguage();

            langSelect.addEventListener('change', (e) => {
                localStorage.setItem('asi_lang', e.target.value);
                if (typeof applyLanguage === 'function') applyLanguage();
            });
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
