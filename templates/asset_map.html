<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title data-i18n="assetMapTitle">Asset Relationship Map</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.css">
    <style>
        body {
            background: #0a0e1a;
            color: #eaeaea;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .navbar {
            background: #141b2b;
            border-bottom: 2px solid #00ff9d;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        /* Language selector in navbar */
        .lang-selector {
            background: transparent;
            border: 1px solid #00ff9d;
            color: #00ff9d;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 0.5rem;
        }
        .lang-selector option {
            background: #141b2b;
            color: #00ff9d;
        }

        #mynetwork {
            width: 100%;
            height: calc(100vh - 56px);
            margin-top: 56px;
            background: #0a0e1a;
        }

        .info-panel {
            position: fixed;
            top: 70px;
            right: 20px;
            width: 300px;
            background: #141b2b;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border-left: 4px solid #00ff9d;
            z-index: 1000;
            display: none;
            color: white;
        }

        .info-panel.show {
            display: block;
        }

        .legend {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #141b2b;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #00ff9d;
            z-index: 1000;
            color: white;
            max-height: 80vh;
            overflow-y: auto;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin: 5px 0;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            margin-right: 10px;
        }

        /* Original types */
        .asset-type { background: #3498db; }
        .subdomain-type { background: #2ecc71; }
        .url-type { background: #e74c3c; }
        .ip-type { background: #f39c12; }
        .port-type { background: #9b59b6; }
        /* New professional types */
        .service-type { background: #1abc9c; }
        .technology-type { background: #e67e22; }
        .email-type { background: #34495e; }
        .cloud_asset-type { background: #16a085; }
        .api_endpoint-type { background: #d35400; }

        .stats-bar {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #141b2b;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #00ff9d;
            z-index: 1000;
            color: white;
            max-width: 300px;
        }

        .table {
            color: #eaeaea;
        }
        .badge {
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('attack_surface_intelligence') }}">
                <i class="bi bi-diagram-3"></i> <span data-i18n="assetMapTitle">Asset Relationship Map</span>
            </a>
            <div class="navbar-nav ms-auto">
                <select id="languageSwitcher" class="lang-selector">
                    <option value="en">English</option>
                    <option value="am">አማርኛ</option>
                </select>
                <a class="nav-link" href="{{ url_for('attack_surface_intelligence') }}">
                    <i class="bi bi-arrow-left"></i> <span data-i18n="backToASI">Back to ASI</span>
                </a>
            </div>
        </div>
    </nav>

    <div id="mynetwork"></div>

    <div class="legend">
        <h6><i class="bi bi-palette"></i> <span data-i18n="legend">Legend</span></h6>
        <div class="legend-item">
            <div class="legend-color asset-type"></div>
            <span data-i18n="assetType">Asset (Domain)</span>
        </div>
        <div class="legend-item">
            <div class="legend-color subdomain-type"></div>
            <span data-i18n="subdomainType">Subdomain</span>
        </div>
        <div class="legend-item">
            <div class="legend-color url-type"></div>
            <span data-i18n="urlType">URL</span>
        </div>
        <div class="legend-item">
            <div class="legend-color ip-type"></div>
            <span data-i18n="ipType">IP Address</span>
        </div>
        <div class="legend-item">
            <div class="legend-color port-type"></div>
            <span data-i18n="portType">Port</span>
        </div>
        <div class="legend-item">
            <div class="legend-color service-type"></div>
            <span data-i18n="serviceType">Service</span>
        </div>
        <div class="legend-item">
            <div class="legend-color technology-type"></div>
            <span data-i18n="technologyType">Technology</span>
        </div>
        <div class="legend-item">
            <div class="legend-color email-type"></div>
            <span data-i18n="emailType">Email</span>
        </div>
        <div class="legend-item">
            <div class="legend-color cloud_asset-type"></div>
            <span data-i18n="cloudAssetType">Cloud Asset</span>
        </div>
        <div class="legend-item">
            <div class="legend-color api_endpoint-type"></div>
            <span data-i18n="apiEndpointType">API Endpoint</span>
        </div>
    </div>

    <div class="stats-bar" id="stats">
        <h6><i class="bi bi-bar-chart"></i> <span data-i18n="statistics">Statistics</span></h6>
        <div><span data-i18n="totalNodes">Total Nodes</span>: <span id="nodeCount">0</span></div>
        <div><span data-i18n="totalConnections">Total Connections</span>: <span id="edgeCount">0</span></div>
    </div>

    <div class="info-panel" id="infoPanel">
        <h5 id="infoTitle" data-i18n="nodeInfo">Node Information</h5>
        <div id="infoContent"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/i18n.js"></script>
    <script>
        // --- vis.js graph initialization (unchanged except translation of dynamic labels can be handled later if needed) ---
        var nodes = new vis.DataSet({{ nodes | safe }});
        var edges = new vis.DataSet({{ links | safe }});

        var container = document.getElementById('mynetwork');

        var data = {
            nodes: nodes,
            edges: edges
        };

        var options = {
            layout: {
                improvedLayout: true,
                hierarchical: {
                    enabled: false
                }
            },
            nodes: {
                shape: 'dot',
                size: 20,
                font: {
                    color: '#eaeaea',
                    size: 12,
                    face: 'Segoe UI'
                },
                borderWidth: 2,
                shadow: true
            },
            edges: {
                width: 2,
                color: { color: '#00ff9d', highlight: '#2ecc71' },
                smooth: {
                    type: 'continuous'
                },
                arrows: {
                    to: { enabled: true, scaleFactor: 0.5 }
                },
                font: {
                    color: '#eaeaea',
                    size: 10
                }
            },
            physics: {
                enabled: true,
                stabilization: {
                    iterations: 1000
                },
                solver: 'forceAtlas2Based',
                forceAtlas2Based: {
                    gravitationalConstant: -50,
                    centralGravity: 0.01,
                    springLength: 100,
                    springConstant: 0.08
                }
            },
            interaction: {
                hover: true,
                tooltipDelay: 200,
                navigationButtons: true,
                keyboard: true
            },
            groups: {
                asset: {
                    color: { background: '#3498db', border: '#2980b9' },
                    shape: 'dot',
                    size: 30
                },
                subdomain: {
                    color: { background: '#2ecc71', border: '#27ae60' },
                    shape: 'dot',
                    size: 20
                },
                url: {
                    color: { background: '#e74c3c', border: '#c0392b' },
                    shape: 'dot',
                    size: 15
                },
                ip: {
                    color: { background: '#f39c12', border: '#e67e22' },
                    shape: 'dot',
                    size: 15
                },
                port: {
                    color: { background: '#9b59b6', border: '#8e44ad' },
                    shape: 'dot',
                    size: 10
                },
                service: {
                    color: { background: '#1abc9c', border: '#16a085' },
                    shape: 'dot',
                    size: 15
                },
                technology: {
                    color: { background: '#e67e22', border: '#d35400' },
                    shape: 'dot',
                    size: 15
                },
                email: {
                    color: { background: '#34495e', border: '#2c3e50' },
                    shape: 'dot',
                    size: 12
                },
                cloud_asset: {
                    color: { background: '#16a085', border: '#0e6b5c' },
                    shape: 'dot',
                    size: 15
                },
                api_endpoint: {
                    color: { background: '#d35400', border: '#a04000' },
                    shape: 'dot',
                    size: 12
                }
            }
        };

        var network = new vis.Network(container, data, options);

        // Update stats
        network.once('stabilizationIterationsDone', function() {
            document.getElementById('nodeCount').innerText = nodes.length;
            document.getElementById('edgeCount').innerText = edges.length;
            network.setOptions({ physics: false });
        });

        // Handle node click (dynamic content – not translated via data-i18n, but the static labels will be translated by i18n.js)
        network.on('click', function(params) {
            if (params.nodes.length > 0) {
                var nodeId = params.nodes[0];
                var node = nodes.get(nodeId);

                // The title "Node Information" is already static with data-i18n, but we can keep the dynamic part as is.
                // For consistency, we can translate the status text dynamically using our translation object if needed,
                // but since status values are from backend (approved/shadow), we keep them as is.
                document.getElementById('infoTitle').innerHTML = node.label || 'Node Information';

                var content = '<table class="table table-sm text-light">';
                // "Type:" – this static label should be translated. We'll use a simple inline approach because it's dynamic.
                // To keep it clean, we'll fetch the translation from the global translations object if available.
                var typeLabel = 'Type';
                var statusLabel = 'Status';
                var riskLabel = 'Risk Score';
                if (window.translations && window.currentLang) {
                    var t = window.translations[window.currentLang] || window.translations.en;
                    typeLabel = t.typeCol || 'Type';
                    statusLabel = t.statusLabel || 'Status';
                    riskLabel = t.riskScoreLabel || 'Risk Score';
                }
                content += '<tr><td><strong>' + typeLabel + ':</strong></td><td>' + (node.group || 'Unknown') + '</td></tr>';
                if (node.status) {
                    content += '<tr><td><strong>' + statusLabel + ':</strong></td><td><span class="badge bg-' + (node.status == 'approved' ? 'success' : 'warning') + '">' + node.status + '</span></td></tr>';
                }
                if (node.title) {
                    var titleParts = node.title.split('\n');
                    titleParts.forEach(part => {
                        var parts = part.split(': ');
                        if (parts.length > 1) {
                            content += '<tr><td><strong>' + parts[0] + ':</strong></td><td>' + parts[1] + '</td></tr>';
                        }
                    });
                }
                if (node.value) {
                    var riskClass = 'secondary';
                    if (node.value >= 20) riskClass = 'danger';
                    else if (node.value >= 10) riskClass = 'warning';
                    else if (node.value >= 5) riskClass = 'info';
                    else if (node.value > 0) riskClass = 'success';
                    content += '<tr><td><strong>' + riskLabel + ':</strong></td><td><span class="badge bg-' + riskClass + '">' + node.value + '</span></td></tr>';
                }
                content += '</table>';
                document.getElementById('infoContent').innerHTML = content;
                document.getElementById('infoPanel').classList.add('show');
            }
        });

        // Handle double click to zoom to node
        network.on('doubleClick', function(params) {
            if (params.nodes.length > 0) {
                network.focus(params.nodes[0], {
                    scale: 1.5,
                    animation: true
                });
            }
        });

        // Hide info panel when clicking on empty space
        network.on('click', function(params) {
            if (params.nodes.length === 0 && params.edges.length === 0) {
                document.getElementById('infoPanel').classList.remove('show');
            }
        });

        // Handle window resize
        window.addEventListener('resize', function() {
            network.fit();
        });

        // --- Language switcher logic ---
        // Store current language globally for dynamic translations in the info panel
        window.currentLang = localStorage.getItem('asi_lang') || 'en';
        // Ensure translations object is accessible (from i18n.js)
        if (typeof translations !== 'undefined') {
            window.translations = translations;
        }

        const langSelect = document.getElementById('languageSwitcher');
        if (langSelect) {
            langSelect.value = window.currentLang;
            if (typeof applyLanguage === 'function') applyLanguage();

            langSelect.addEventListener('change', (e) => {
                const newLang = e.target.value;
                localStorage.setItem('asi_lang', newLang);
                window.currentLang = newLang;
                if (typeof applyLanguage === 'function') applyLanguage();
                // Optionally, we could refresh the graph labels, but not needed for static elements.
            });
        }
    </script>
</body>
</html>
