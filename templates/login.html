<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title data-i18n="pageTitle">ASI Secure Terminal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
    background:black;
    font-family: 'Share Tech Mono', monospace;
    color:#00ff9f;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0;
}

/* Terminal Window */
.terminal{
    width:460px;
    background:#050505;
    border:1px solid #00ff9f;
    border-radius:8px;
    box-shadow:0 0 25px #00ff9f;
    padding:25px;
    position:relative;
    overflow:hidden;
}

/* scanning line */
.terminal::after{
    content:"";
    position:absolute;
    top:-100%;
    left:0;
    width:100%;
    height:2px;
    background:#00ff9f;
    animation:scan 4s linear infinite;
}

@keyframes scan{
    0%{top:-100%;}
    100%{top:100%;}
}

/* terminal header */
.terminal-header{
    font-size:14px;
    margin-bottom:20px;
    color:#00ff9f;
}

/* terminal prompt */
.prompt{
    margin-bottom:8px;
}

/* inputs */
.form-control{
    background:black;
    border:1px solid #00ff9f;
    color:#00ff9f;
}

.form-control:focus{
    background:black;
    color:#00ff9f;
    box-shadow:0 0 10px #00ff9f;
    border-color:#00ff9f;
}

/* login button */
.login-btn{
    margin-top:15px;
    background:#00ff9f;
    border:none;
    color:black;
    font-weight:bold;
}

.login-btn:hover{
    box-shadow:0 0 15px #00ff9f;
}

/* typing animation */
.typing{
    overflow:hidden;
    white-space:nowrap;
    border-right:2px solid #00ff9f;
    animation:typing 4s steps(40,end), blink .8s infinite;
}

@keyframes typing{
    from{width:0}
    to{width:100%}
}

@keyframes blink{
    50%{border-color:transparent}
}

.footer{
    font-size:11px;
    margin-top:15px;
    opacity:0.6;
}

/* Language selector */
.lang-selector{
    position: absolute;
    top: 10px;
    right: 20px;
    background: transparent;
    border: 1px solid #00ff9f;
    color: #00ff9f;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 3px 6px;
    border-radius: 4px;
    cursor: pointer;
    z-index: 10;
}
.lang-selector option{
    background: black;
    color: #00ff9f;
}
</style>
</head>
<body>

<div class="terminal">
    <!-- Language Dropdown -->
    <select id="languageSwitcher" class="lang-selector">
        <option value="en">English</option>
        <option value="am">አማርኛ</option>
    </select>

    <div class="terminal-header typing" data-i18n="terminalHeader">Initializing ASI Security Terminal...</div>

    <form method="POST" action="">
        <div class="prompt" data-i18n="promptUsername">&gt; Enter Username</div>
        <input type="text" name="username" class="form-control mb-3" required autocomplete="off">

        <div class="prompt" data-i18n="promptPassword">&gt; Enter Password</div>
        <input type="password" name="password" class="form-control" required>

        <button class="btn login-btn w-100" data-i18n="loginButton">EXECUTE LOGIN</button>
    </form>

    <div class="footer" data-i18n="footerText">ASI • Asset Security Intelligence System</div>
</div>

<!-- Shared i18n script -->
<script src="/static/js/i18n.js"></script>
<script>
    (function() {
        const langSelect = document.getElementById('languageSwitcher');
        if (!langSelect) return;

        // Load saved language or default to English
        const savedLang = localStorage.getItem('asi_lang') || 'en';
        langSelect.value = savedLang;

        // Apply translations (from i18n.js)
        if (typeof applyLanguage === 'function') {
            applyLanguage();
        }

        // Restart typing animation after text changes
        function restartTypingAnimation() {
            const header = document.querySelector('.terminal-header');
            if (!header) return;
            header.classList.remove('typing');
            // Force reflow to restart animation
            void header.offsetWidth;
            header.classList.add('typing');
        }

        // Handle language switch
        langSelect.addEventListener('change', function(e) {
            const newLang = e.target.value;
            localStorage.setItem('asi_lang', newLang);
            if (typeof applyLanguage === 'function') {
                applyLanguage();
                restartTypingAnimation();
            }
        });
    })();
</script>
</body>
</html>
