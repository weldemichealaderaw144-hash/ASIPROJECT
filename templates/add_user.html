<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add User · ASI Admin</title>
    <!-- Bootstrap 5 dark theme -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f68b1f;
            --primary-hover: #ffa23f;
            --bg-dark: #0a0e12;
            --bg-card: #141b21;
            --bg-header: #0f1419;
            --border-color: #1e2a32;
            --text-primary: #e0e4e8;
            --text-secondary: #8899a6;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding-top: 70px;
            margin: 0;
        }

        /* Navbar (identical to dashboard) */
        .navbar.bg-dark {
            background-color: var(--bg-header) !important;
            border-bottom: 1px solid var(--border-color);
        }
        .navbar-brand i {
            color: var(--primary);
        }
        .navbar-nav .nav-link {
            color: var(--text-secondary) !important;
            transition: color 0.2s;
        }
        .navbar-nav .nav-link:hover {
            color: var(--primary) !important;
        }
        .btn-outline-shodan {
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            background: transparent;
            padding: 0.2rem 0.8rem;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .btn-outline-shodan:hover {
            border-color: var(--primary);
            color: var(--primary);
            background-color: rgba(246, 139, 31, 0.1);
        }

        /* Main container */
        .container {
            max-width: 600px;
        }

        /* Page header */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
        }
        .page-header h2 {
            font-weight: 400;
            font-size: 1.8rem;
            color: #fff;
            letter-spacing: -0.5px;
            margin: 0;
        }
        .page-header h2 i {
            color: var(--primary);
            margin-right: 10px;
        }

        /* Form card */
        .card-shodan {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        /* Form labels */
        .form-label {
            color: var(--primary);
            font-weight: 500;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 0.3rem;
        }
        .form-label i {
            margin-right: 5px;
            color: var(--text-secondary);
        }

        /* Form inputs & select */
        .form-control, .form-select {
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Roboto Mono', monospace;
            font-size: 0.9rem;
            padding: 0.6rem 1rem;
        }
        .form-control:focus, .form-select:focus {
            background-color: var(--bg-dark);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(246, 139, 31, 0.2);
            color: #fff;
        }
        .form-control::placeholder {
            color: var(--text-secondary);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
        }
        .form-select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%238899a6' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
        }

        /* Buttons */
        .btn-shodan-primary {
            background-color: var(--primary);
            border: none;
            color: #000;
            font-weight: 600;
            padding: 0.6rem 1.8rem;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .btn-shodan-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(246, 139, 31, 0.3);
        }
        .btn-outline-shodan-secondary {
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-secondary);
            padding: 0.6rem 1.8rem;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .btn-outline-shodan-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
            background-color: rgba(246, 139, 31, 0.05);
        }

        .btn i {
            margin-right: 5px;
        }
    </style>
</head>
<body data-bs-theme="dark">

    <!-- Shodan‑style navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top" style="background-color: #0f1419;">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('dashboard') }}">
                <i class="bi bi-shield-shaded"></i> ASI <span style="color:#f68b1f;">Admin</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    {% if session.get('role') == 'admin' %}
                        <li class="nav-item"><a href="{{ url_for('add_asset') }}" class="btn btn-sm btn-outline-shodan me-2"><i class="bi bi-plus-circle"></i> Add Asset</a></li>
                        <li class="nav-item"><a href="{{ url_for('admin_users') }}" class="btn btn-sm btn-outline-shodan me-2"><i class="bi bi-people"></i> Users</a></li>
                        <li class="nav-item"><a href="{{ url_for('activity_logs') }}" class="btn btn-sm btn-outline-shodan me-2"><i class="bi bi-journal-text"></i> Logs</a></li>
                        <li class="nav-item"><a href="{{ url_for('attack_surface_intelligence') }}" class="btn btn-sm btn-outline-shodan me-2"><i class="bi bi-graph-up"></i> ASI Intel</a></li>
                    {% endif %}
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <span class="navbar-text text-light me-3">
                            <i class="bi bi-person-circle"></i> {{ session.get('username') }} ({{ session.get('role') }})
                        </span>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('logout') }}"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main content -->
    <div class="container">
        <!-- Page header -->
        <div class="page-header">
            <h2><i class="bi bi-person-plus"></i> Add New User</h2>
        </div>

        <!-- Form card -->
        <div class="card-shodan">
            <form method="POST">
                <!-- Username -->
                <div class="mb-4">
                    <label class="form-label"><i class="bi bi-person-badge"></i> Username</label>
                    <input type="text" name="username" class="form-control" placeholder="e.g. Welde" required>
                </div>

                <!-- Password -->
                <div class="mb-4">
                    <label class="form-label"><i class="bi bi-lock"></i> Password</label>
                    <input type="password" name="password" class="form-control" placeholder="··········" required>
                </div>

                <!-- Role -->
                <div class="mb-4">
                    <label class="form-label"><i class="bi bi-shield-lock"></i> Role</label>
                    <select name="role" class="form-select" required>
                        <option value="admin">Admin</option>
                        <option value="analyst">Analyst</option>
                    </select>
                </div>

                <!-- Form actions -->
                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-shodan-primary">
                        <i class="bi bi-check-lg"></i> Create User
                    </button>
                    <a href="{{ url_for('admin_users') }}" class="btn btn-outline-shodan-secondary">
                        <i class="bi bi-x-lg"></i> Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
